<!-- ============ HERO ============ -->
<section class="hero fade-in">
  <div class="hero-wave" aria-hidden="true"></div>
  <div class="hero-inner">
    <span class="hero-eyebrow">● Now streaming, Anytime! Anywhere!</span>
    <h1 class="hero-title">Stream what <span>moves you</span></h1>
    <p class="hero-desc">Audizy turns any search into an instant, gapless listening session — no downloads, no clutter,
      just the sound you came for.</p>
    <form class="hero-search">
      <input type="text" placeholder="Try “believer”, a mood, an artist..." aria-label="Search for music">
      <button type="submit">Search</button>
    </form>
  </div>
</section>

</section>
